name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'dev/**'

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build unsigned app
        run: |
          set -euo pipefail

          xcodebuild \
            -project Clip.xcodeproj \
            -scheme Clip \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          APP_PATH="$PWD/build/DerivedData/Build/Products/Release-iphoneos/Clip.app"
          IPA_DIR="$PWD/build/ipa"
          IPA_PATH="$PWD/build/Clip-unsigned.ipa"

          test -d "$APP_PATH"
          rm -rf "$IPA_DIR" "$IPA_PATH"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"

          (
            cd "$IPA_DIR"
            ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_PATH"
          )

          ls -lh "$IPA_PATH"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v7
        with:
          name: Clip-unsigned-IPA
          path: build/Clip-unsigned.ipa
          if-no-files-found: error
